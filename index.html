<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Argus – Huntridge Labs</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .logo {
      font-size: 3.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #58a6ff;
      margin-bottom: 0.5rem;
    }
    .tagline {
      font-size: 1.1rem;
      color: #8b949e;
      margin-bottom: 2.5rem;
    }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 2rem 2.5rem;
      max-width: 560px;
      width: 100%;
    }
    .card h2 {
      font-size: 1.25rem;
      color: #e6edf3;
      margin-bottom: 0.75rem;
    }
    .card p {
      font-size: 0.95rem;
      line-height: 1.6;
      color: #8b949e;
    }
    footer {
      margin-top: 3rem;
      font-size: 0.8rem;
      color: #484f58;
    }
    footer a {
      color: #58a6ff;
      text-decoration: none;
    }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="logo">Argus</div>
  <p class="tagline">by Huntridge Labs</p>

  <div class="card">
    <h2>Coming Soon</h2>
    <p>
      Argus is a project by Huntridge Labs. More details will be available here shortly.
    </p>
  </div>

  <footer>
    &copy; <span id="year">2026</span> <a href="https://huntridgelabs.com">Huntridge Labs</a>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
